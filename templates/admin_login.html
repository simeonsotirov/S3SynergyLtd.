<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #1e2d3a; }
        .login-card { background: #fff; border-radius: 10px; padding: 48px 40px; width: 100%; max-width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
        .login-card h1 { font-size: 1.5rem; margin-bottom: 8px; color: #1e2d3a; }
        .login-card p { color: #6b7a8d; margin-bottom: 28px; font-size: 0.95rem; }
        .login-card label { display: block; font-size: 0.88rem; font-weight: 600; color: #1e2d3a; margin-bottom: 6px; }
        .login-card input[type="text"], .login-card input[type="password"] { width: 100%; padding: 10px 14px; border: 1.5px solid #d1d9e0; border-radius: 6px; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; outline: none; transition: border-color 0.2s; }
        .login-card input[type="text"]:focus, .login-card input[type="password"]:focus { border-color: #2a7ae2; }
        .login-card button { width: 100%; padding: 11px; background: #2a7ae2; color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .login-card button:hover { background: #1b5fbe; }
        .flash-error { color: #c0392b; font-size: 0.9rem; margin-bottom: 14px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Admin Login</h1>
        <p>S3 Synergy Ltd — Content Management</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash-error">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autofocus required autocomplete="username">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
